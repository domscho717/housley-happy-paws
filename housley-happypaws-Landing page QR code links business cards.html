<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Housley Happy Paws</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Jost', sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, #FDF6EC 0%, #F5E8CC 50%, #EDD9A3 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px;
  }
  .card {
    background: white;
    border-radius: 28px;
    padding: 40px 32px 36px;
    max-width: 380px; width: 100%;
    box-shadow: 0 24px 64px rgba(90,50,10,0.14), 0 4px 20px rgba(90,50,10,0.08);
    display: flex; flex-direction: column; align-items: center; gap: 0;
  }
  .logo-wrap {
    width: 110px; height: 110px; border-radius: 50%;
    background: linear-gradient(145deg, #F9EDDA, #FDF6EC);
    border: 3px solid #C8963E;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
    box-shadow: 0 6px 24px rgba(200,150,62,0.2);
  }
  .logo-wrap img { width: 96px; height: 96px; object-fit: contain; border-radius: 50%; }
  .brand { font-family: 'Fredoka One', cursive; font-size: 1.9rem; color: #6B3E10; text-align: center; line-height: 1.1; }
  .tagline {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: #9B7B5A;
    text-align: center; margin-top: 6px; margin-bottom: 6px;
  }
  .location { font-size: 0.75rem; color: #9B7B5A; text-align: center; margin-bottom: 24px; }
  .divider {
    width: 60px; height: 2px; margin: 0 auto 24px;
    background: linear-gradient(90deg, transparent, #C8963E, transparent);
  }
  .links { display: flex; flex-direction: column; gap: 12px; width: 100%; }
  .link-btn {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px; border-radius: 14px;
    text-decoration: none; transition: all 0.2s;
    border: 2px solid transparent;
  }
  .link-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
  .link-btn.website {
    background: linear-gradient(135deg, #C8963E, #9B6E25);
    color: white;
  }
  .link-btn.instagram {
    background: linear-gradient(135deg, #f9ce34, #ee2a7b, #6228d7);
    color: white;
  }
  .link-btn.facebook {
    background: #1877F2; color: white;
  }
  .link-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; flex-shrink: 0;
  }
  .link-text { display: flex; flex-direction: column; }
  .link-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.85; }
  .link-name { font-size: 0.95rem; font-weight: 700; }
  .footer {
    margin-top: 28px; font-size: 0.62rem; color: #9B7B5A;
    text-align: center; letter-spacing: 0.06em; line-height: 1.7;
  }
  .footer strong { font-family: 'Fredoka One', cursive; color: #C8963E; font-size: 0.75rem; }
</style>
</head>
